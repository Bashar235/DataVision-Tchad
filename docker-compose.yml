version: '3.8'

services:
  # PostgreSQL Database with PostGIS support
  db:
    image: postgres:16-alpine
    container_name: datavision-db
    environment:
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
      POSTGRES_DB: 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Placeholder for PostGIS extension setup
    # command: postgres -c 'shared_preload_libraries=postgis'

  # FastAPI Backend
  backend:
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: datavision-backend
    # environment:
    #   DATABASE_URL: 
    #   SECRET_KEY: 
    ports:
      - "8000:8000"
    # depends_on:
    #   - db
    # volumes:
    #   - ./backend:/app

  # React + Vite Frontend
  frontend:
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    container_name: datavision-frontend
    # environment:
    #   VITE_API_URL: 
    ports:
      - "5173:5173"
    # depends_on:
    #   - backend
    # volumes:
    #   - ./frontend:/app

volumes:
  postgres_data:
